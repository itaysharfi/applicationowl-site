<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Application Owl</title>
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title }} - Application Owl">
  <meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }} - Application Owl">
  <meta name="twitter:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8BHKSQ7K93"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8BHKSQ7K93');
  </script>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">Application Owl</a>
      <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/ai-coach.html">AI Coach</a></li>
        <li><a href="/coached-plan.html">Coached Plan</a></li>
        <li><a href="/blog" class="active">Blog</a></li>
        <li><a href="https://chat-dev.applicationowl.com/login" class="btn btn-primary btn-nav">Try Free</a></li>
      </ul>
    </div>
  </nav>

  <article class="post-content-page">
    <div class="container">
      <div class="post-header">
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      </div>
      <div class="post-content">
        {{ content }}
      </div>
      <div class="post-cta">
        <p>Want help with your job search? <a href="https://chat-dev.applicationowl.com/login">Try Application Owl free for 3 days.</a></p>
      </div>
    </div>
  </article>

  <footer>
    <div class="container">
      &copy; 2026 by Application Owl &middot; <a href="https://linkedin.com/company/applicationowl">LinkedIn</a> &middot; <a href="mailto:info@applicationowl.com">info@applicationowl.com</a>
    </div>
  </footer>

  <script>
    document.querySelector('.menu-toggle').addEventListener('click', function () {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>

</body>
</html>
