<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Application Owl</title>
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title }} - Application Owl">
  <meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }} - Application Owl">
  <meta name="twitter:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 155 }}">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">Application Owl</a>
    </div>
  </nav>

  <article class="post-content-page">
    <div class="container">
      <div class="post-header">
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      </div>
      <div class="post-content">
        {{ content }}
      </div>
      <div class="post-cta">
        <p>Written by <strong>Itay Sharfi</strong>, founder of Application Owl. <a href="https://linkedin.com/in/itaysharfi">Connect on LinkedIn.</a></p>
      </div>
    </div>
  </article>

  <footer>
    <div class="container">
      &copy; 2024-2026 Application Owl &middot; <a href="https://linkedin.com/in/itaysharfi">Itay Sharfi</a>
    </div>
  </footer>

</body>
</html>
